<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games Website</title>
  <script>
    // Only set a base if none exists — loaders (CDN/data) may inject a correct <base> first.
    (function(){
      try{
        if(document.querySelector('base')) return;
        var href = location.href.split('?')[0];
        var base = href.endsWith('/') ? href : href.substring(0, href.lastIndexOf('/') + 1);
        var b = document.createElement('base');
        b.href = base;
        document.head.appendChild(b);
      }catch(e){ console.warn('base setup failed', e) }
    })();
  </script>
  <style>
    /* Dark navy / black theme */
    :root{--bg:#020610;--panel:#071022;--navy:#07264d;--accent:#0b65d8;--muted:#9fb7ff;--text:#e6f0ff}
    *{box-sizing:border-box}
    body{background:linear-gradient(180deg,var(--bg),#041229);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif;margin:0;padding:0}
    header{position:fixed;left:0;right:0;top:0;height:72px;background:linear-gradient(180deg,var(--navy),#021428);border-bottom:3px solid rgba(11,101,216,0.18);display:flex;align-items:center;z-index:120;padding:0 18px}
    .site-row{max-width:1200px;margin:0 auto;width:100%;display:flex;align-items:center;gap:12px}
    .brand{color:var(--accent);font-weight:800;font-size:1.25rem}
    #searchBar{margin-left:12px;padding:10px 12px;border-radius:10px;border:0;background:rgba(255,255,255,0.03);color:var(--text);min-width:240px}
    .controls{margin-left:auto;display:flex;gap:8px}
    .btn{background:var(--panel);color:var(--text);border:2px solid rgba(255,255,255,0.03);padding:8px 10px;border-radius:8px;cursor:pointer}
    main{padding:110px 20px 80px;max-width:1200px;margin:0 auto}
    .games-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px}
    .game-item{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:12px;padding:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.03);transition:transform .16s ease,box-shadow .16s ease;display:flex;flex-direction:column}
    .game-item:hover{transform:translateY(-6px);box-shadow:0 12px 36px rgba(2,8,20,0.6);border-color:var(--accent)}
    .game-item img{width:100%;height:120px;object-fit:cover;border-radius:8px;background:#031323}
    .game-item .title{margin-top:10px;color:var(--text);font-weight:700}
    footer{position:fixed;bottom:0;left:0;right:0;padding:10px 0;text-align:center;background:linear-gradient(180deg,transparent,rgba(2,6,12,0.6));z-index:90}
    /* viewer styles */
    .viewer{position:fixed;inset:72px 0 0 0;background:#000;display:none;z-index:200;flex-direction:column}
    .viewer .viewer-bar{height:56px;background:linear-gradient(90deg,#021428,#041a2a);display:flex;align-items:center;padding:0 12px;gap:12px;border-bottom:2px solid rgba(11,101,216,0.12)}
    .viewer .viewer-bar .vtitle{color:var(--accent);font-weight:700}
    .viewer iframe{flex:1;border:0;width:100%;height:calc(100vh - 128px);background:#000}
    .hidden{display:none}
  </style>
</head>
<body>
  <header>
    <div class="site-row">
      <div class="brand">WLS Games</div>
      <input type="text" id="searchBar" placeholder="Search games...">
      <div class="controls">
        <button id="refresh" class="btn" title="Refresh">⟳</button>
        <button id="settings" class="btn" title="Settings">⚙</button>
      </div>
    </div>
  </header>
  <main>
    <div id="gamesContainer" class="games-container">
      <!-- Games will be populated here by JS -->
    </div>
  </main>
  <script>
    // Games list (local-friendly)
    // Games list — images served from /img/<name>. Add games easily with addGame().
    const games = [];
    function addGame({title, img, page}){ games.push({title, img: img.startsWith('/')? img : '/img/'+img, page}); }
    // sample entries
    addGame({title:'Request a Game', img:'placeholder_request.png', page:'https://docs.google.com/forms/d/e/1FAIpQLSfD-example-form/viewform'});
    addGame({title:'Snow Rider 3D', img:'SnowRider3D.png', page:'games/SnowRider3D.html'});
    addGame({title:'Clover Pit', img:'clover.png', page:'games/clover.html'});
    // optionally load /games.json if present (non-blocking)
    (async ()=>{ try{ const res=await fetch('/games.json'); if(res.ok){ const j=await res.json(); if(Array.isArray(j)) { j.forEach(g=> addGame(g)); } } }catch(e){} })();

    function initGames(){
      const container=document.getElementById('gamesContainer');
      const searchBar=document.getElementById('searchBar');
      const viewer = createViewer();

      function renderGames(filter=''){
        container.innerHTML='';
        const q=(filter||'').trim().toLowerCase();
        games.forEach(g=>{
          if(q && !g.title.toLowerCase().includes(q)) return;
          const item=document.createElement('div'); item.className='game-item';
          const link=document.createElement('a'); link.href = g.page || '#'; link.dataset.page = g.page || '';
          const img=document.createElement('img'); img.src=g.img; img.alt=g.title; link.appendChild(img);
          const title=document.createElement('div'); title.className='title'; title.textContent=g.title; link.appendChild(title);
          item.appendChild(link); container.appendChild(item);
        });
      }

      // Intercept clicks on local game links and open in in-page viewer
      container.addEventListener('click', async (ev)=>{
        const a = ev.target.closest && ev.target.closest('a'); if(!a) return;
        const page = a.dataset.page || a.getAttribute('href'); if(!page) return;
        // absolute external -> open new tab
        if(/^https?:\/\//i.test(page) && !/\/games\//i.test(page)){ return; }
        ev.preventDefault();
        const controller = new AbortController();
        const timeoutMs = 15000;
        const timeout = setTimeout(()=>controller.abort(), timeoutMs);
        showSpinner(true);
        try{
          const url = /^https?:\/\//i.test(page) ? page : (new URL(page, location.href)).href;
          const res = await fetch(url, {cache:'no-store', signal: controller.signal});
          clearTimeout(timeout);
          if(!res.ok) throw new Error('HTTP '+res.status+' '+url);
          let text = await res.text();
          // inject base for relative assets
          const base = (new URL(url)).href.replace(/[^/]+$/, '');
          text = text.replace(/<head([^>]*)>/i, m => m + `<base href="${base}">`);
          // create blob URL to load into iframe (isolates parsing/execution)
          const blob = new Blob([text], {type: 'text/html'});
          const blobUrl = URL.createObjectURL(blob);
          try{ viewer.openBlob(blobUrl, a.textContent || 'Game'); }finally{ setTimeout(()=>URL.revokeObjectURL(blobUrl), 30000); }
        }catch(err){
          console.error(err);
          alert('Failed to load game: '+(err.name==='AbortError'?'timeout':err.message));
        }finally{ clearTimeout(timeout); showSpinner(false); }
      });

      searchBar.addEventListener('input', e=> renderGames(e.target.value)); renderGames();
      document.getElementById('refresh').addEventListener('click', ()=>renderGames(searchBar.value));
    }

    function createViewer(){
      const root = document.createElement('div'); root.className='viewer'; document.body.appendChild(root);
      const bar = document.createElement('div'); bar.className='viewer-bar'; root.appendChild(bar);
      const title = document.createElement('div'); title.className='vtitle'; bar.appendChild(title);
      const spacer = document.createElement('div'); spacer.style.flex='1'; bar.appendChild(spacer);
      const openBtn = document.createElement('button'); openBtn.className='btn'; openBtn.textContent='Open'; bar.appendChild(openBtn);
      const dlBtn = document.createElement('button'); dlBtn.className='btn'; dlBtn.textContent='Download'; bar.appendChild(dlBtn);
      const backBtn = document.createElement('button'); backBtn.className='btn'; backBtn.textContent='Back'; bar.appendChild(backBtn);
      const fsBtn = document.createElement('button'); fsBtn.className='btn'; fsBtn.textContent='Fullscreen'; bar.appendChild(fsBtn);
      const frame = document.createElement('iframe');
      frame.sandbox = 'allow-scripts allow-forms allow-pointer-lock allow-popups';
      frame.allow = 'fullscreen';
      frame.style.background = '#000';
      root.appendChild(frame);

      openBtn.addEventListener('click', ()=>{ if(frame.src) window.open(frame.src,'_blank'); });
      dlBtn.addEventListener('click', ()=>{ if(frame.src){ const a=document.createElement('a'); a.href=frame.src; a.target='_blank'; a.rel='noopener'; a.click(); } });
      backBtn.addEventListener('click', ()=>{ root.style.display='none'; frame.src=''; document.body.style.overflow=''; hideSpinner(); });
      fsBtn.addEventListener('click', async ()=>{ try{ if(!document.fullscreenElement) await root.requestFullscreen(); else await document.exitFullscreen(); }catch(e){} });

      return {
        open(html, t){ title.textContent = t||'Game'; frame.srcdoc = html; root.style.display='flex'; document.body.style.overflow='hidden'; },
        openBlob(blobUrl, t){ title.textContent = t||'Game'; frame.src = blobUrl; root.style.display='flex'; document.body.style.overflow='hidden'; }
      };
    }

    // spinner utilities
    let _spinnerEl = null;
    function showSpinner(on){ if(!_spinnerEl){ _spinnerEl = document.createElement('div'); _spinnerEl.style = 'position:fixed;left:0;right:0;top:72px;bottom:0;display:flex;align-items:center;justify-content:center;z-index:250;pointer-events:none'; const s=document.createElement('div'); s.innerHTML = '<div style="width:64px;height:64px;border-radius:50%;border:8px solid rgba(255,255,255,0.06);border-top-color:var(--accent);animation:spin 1s linear infinite"></div>'; _spinnerEl.appendChild(s); const css=document.createElement('style'); css.textContent='@keyframes spin{to{transform:rotate(360deg)}}'; document.head.appendChild(css); document.body.appendChild(_spinnerEl); } _spinnerEl.style.display = on? 'flex':'none'; }
    function hideSpinner(){ showSpinner(false); }

    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', initGames); else initGames();
  </script>
  <script src="global.js"></script>
</body>
</html>
