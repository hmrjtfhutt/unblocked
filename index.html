<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WLS Games</title>
  <style>
    :root{--accent:#0b65d8;--bg:#000000;--panel:#071028;color:#fff}
    body{margin:0;background:linear-gradient(180deg,#000000,#061230);color:#fff;font-family:Arial,Helvetica,sans-serif}
    header{padding:8px 12px;border-bottom:3px solid var(--accent);position:fixed;left:0;right:0;top:0;height:56px;display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,rgba(3,16,40,0.9),rgba(5,20,48,0.85));backdrop-filter:blur(6px);z-index:100}
    .title{color:var(--accent);font-weight:700;font-size:1.25rem}
    #searchBar{margin-left:8px;padding:8px 12px;border-radius:10px;border:0;background:rgba(255,255,255,0.03);color:var(--text);min-width:220px}
    main{padding:84px 16px 24px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;align-items:start}
    .card{background:var(--panel);border:2px solid rgba(255,255,255,0.03);border-radius:12px;padding:8px;text-align:center;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}
    .card:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(3,12,30,0.6);border-color:var(--accent)}
    /* match main site's thumbnail sizing */
    .card img{width:100%;height:120px;object-fit:cover;border-radius:6px}
    .card div{margin-top:8px;color:#dfe9ff;font-weight:600}
    .banner{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:3px solid var(--accent);position:fixed;left:0;right:0;top:0;background:#111;z-index:999;height:56px}
    .banner .title{color:var(--accent);font-weight:bold}
    .banner .spacer{flex:1}
    .btn{background:var(--panel);color:#fff;border:2px solid var(--accent);padding:6px 10px;border-radius:6px;cursor:pointer}
    /* game view area sits under the fixed banner */
    #gameView{position:relative;padding-top:0;box-sizing:border-box}
    /* injected covers the full area under the top bar — pinned to all sides */
    .injected{position:fixed;top:56px;left:0;right:0;bottom:0;margin:0;padding:0;box-sizing:border-box}
    .injected .game-wrapper{width:100%;height:100%;background:#000;display:block}
    .injected .game-wrapper iframe{width:100%;height:100%;object-fit:cover;display:block}
    /* Force injected content to fill the area */
    .injected > *{width:100% !important;height:100% !important;max-width:none !important;max-height:none !important;margin:0 !important;padding:0 !important;box-sizing:border-box}
    .injected *{width:100% !important;height:100% !important;max-width:none !important;max-height:none !important;margin:0 !important;padding:0 !important;box-sizing:border-box}
    .hidden{display:none}
  </style>
</head>
<body>
  <div id="listView">
    <header>
      <h1>WLS Games</h1>
      <input id="searchBar" placeholder="Search..." />
    </header>
    <main>
      <div id="gamesContainer" class="grid"></div>
    </main>
  </div>

  <div id="gameView" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
