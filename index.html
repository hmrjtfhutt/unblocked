<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games Website</title>
  <script>
    // Ensure relative asset URLs resolve when this file is loaded from a CDN URL.
    (function(){
      try{
        var href = location.href.split('?')[0];
        var base = href.endsWith('/') ? href : href.substring(0, href.lastIndexOf('/') + 1);
        var b = document.createElement('base');
        b.href = base;
        document.head.appendChild(b);
      }catch(e){ console.warn('base setup failed', e) }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="global.css">
</head>
<body>
  <header>
    <h1>Games Collection</h1>
    <input type="text" id="searchBar" placeholder="Search for games...">
  </header>
  <main>
    <div id="gamesContainer" class="games-container">
      <!-- Games will be populated here by JS -->
    </div>
  </main>
  <script src="games.js"></script>
  <script src="global.js"></script>
</body>
</html>
